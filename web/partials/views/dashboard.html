    <section id="dashboard-view">
        <div class="dash-stats" id="dash-stats"></div>
        <div class="dash-tab-bar">
            <button class="dash-tab-btn active" onclick="showDashTab('overview')">Overview</button>
            <button class="dash-tab-btn" onclick="showDashTab('activity')">Activity</button>
            <button class="dash-tab-btn" onclick="showDashTab('infrastructure')">Infrastructure</button>
        </div>
        <div class="dash-tab-panel active" data-tab="overview">
            <div class="card" style="margin-bottom:16px">
                <div class="card-header" style="cursor:pointer" onclick="showPage('monitor');setSubTab('monitor','runs')"><h3>Execution Timeline (15 min) <span style="font-size:11px;color:var(--accent)">&rarr;</span></h3></div>
                <div id="dash-timeline"></div>
            </div>
            <div class="dash-charts">
                <div class="card">
                    <div class="card-header"><h3>Execution Outcomes</h3></div>
                    <div id="dash-chart-outcomes"></div>
                </div>
                <div class="card">
                    <div class="card-header"><h3>Task Types</h3></div>
                    <div id="dash-chart-tasks"></div>
                </div>
                <div class="card">
                    <div class="card-header"><h3>Schedule Types</h3></div>
                    <div id="dash-chart-schedules"></div>
                </div>
            </div>
        </div>
        <div class="dash-tab-panel" data-tab="activity">
            <div id="dash-running-section"></div>
            <div id="dash-failed-section"></div>
            <div class="dash-activity-grid">
                <div class="dash-activity-main">
                    <div class="card" style="margin-bottom:16px">
                        <div class="card-header" style="cursor:pointer" onclick="showPage('monitor');setSubTab('monitor','runs')"><h3>Recent Executions <span style="font-size:11px;color:var(--accent)">&rarr;</span></h3></div>
                        <div id="dash-recent-execs"></div>
                    </div>
                    <div class="card">
                        <div class="card-header" style="cursor:pointer" onclick="showPage('monitor');setSubTab('monitor','events')"><h3>Recent Events <span style="font-size:11px;color:var(--accent)">&rarr;</span></h3></div>
                        <div id="dash-recent-events"></div>
                    </div>
                </div>
                <div class="dash-activity-side">
                    <div class="card">
                        <div class="card-header" style="cursor:pointer" onclick="showPage('monitor');setSubTab('monitor','jobs')"><h3>Top Groups <span style="font-size:11px;color:var(--accent)">&rarr;</span></h3></div>
                        <div id="dash-top-groups"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="dash-tab-panel" data-tab="infrastructure">
            <div class="card" style="margin-bottom:16px">
                <div class="card-header" style="cursor:pointer" onclick="showPage('settings')"><h3>Agents <span style="font-size:11px;color:var(--accent)">&rarr;</span></h3></div>
                <div id="dash-agents"></div>
            </div>
            <div class="card" style="margin-bottom:16px">
                <div class="card-header" style="cursor:pointer" onclick="showPage('pipelines');setSubTab('pipelines','stages')"><h3>Pipeline Stages <span style="font-size:11px;color:var(--accent)">&rarr;</span></h3></div>
                <div id="dash-stages"></div>
            </div>
            <div class="card">
                <div class="card-header" style="cursor:pointer" onclick="showPage('pipelines');setSubTab('pipelines','map')"><h3>Dependency Map <span style="font-size:11px;color:var(--accent)">&rarr;</span></h3></div>
                <div class="map-container" id="dash-map-container" style="width:100%;height:400px;border-radius:var(--radius)"></div>
                <div class="map-controls" id="dash-map-controls" style="display:none">
                    <button onclick="dashCyInstance&&dashCyInstance.fit(undefined,30)" title="Fit all" class="map-fit-btn"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6V3a1 1 0 011-1h3M10 2h3a1 1 0 011 1v3M14 10v3a1 1 0 01-1 1h-3M6 14H3a1 1 0 01-1-1v-3"/><circle cx="8" cy="8" r="2.5"/></svg></button>
                    <button onclick="dashCyInstance&&dashCyInstance.zoom(dashCyInstance.zoom()/1.3);dashCyInstance.center()" title="Zoom out">&minus;</button>
                    <input type="range" id="dash-map-zoom-slider" min="15" max="300" value="100" oninput="if(dashCyInstance)dashCyInstance.zoom(this.value/100)" style="width:150px">
                    <button onclick="dashCyInstance&&dashCyInstance.zoom(dashCyInstance.zoom()*1.3);dashCyInstance.center()" title="Zoom in">+</button>
                </div>
            </div>
        </div>
    </section>
