    <section id="dashboard-view">
        <div class="dash-stats" id="dash-stats"></div>
        <div class="dash-tab-bar">
            <button class="dash-tab-btn active" onclick="showDashTab('overview')">Overview</button>
            <button class="dash-tab-btn" onclick="showDashTab('charts')">Charts</button>
            <button class="dash-tab-btn" onclick="showDashTab('activity')">Activity</button>
            <button class="dash-tab-btn" onclick="showDashTab('infrastructure')">Infrastructure</button>
        </div>
        <div class="dash-tab-panel active" data-tab="overview">
            <div class="card" style="margin-bottom:16px">
                <div class="card-header" style="cursor:pointer" onclick="showPage('executions')"><h3>Execution Timeline (15 min) <span style="font-size:11px;color:var(--accent)">&rarr;</span></h3></div>
                <div id="dash-timeline"></div>
            </div>
            <div class="card">
                <div class="card-header" style="cursor:pointer" onclick="showPage('executions')"><h3>Recent Executions <span style="font-size:11px;color:var(--accent)">&rarr;</span></h3></div>
                <div id="dash-recent-execs"></div>
            </div>
        </div>
        <div class="dash-tab-panel" data-tab="charts">
            <div class="dash-charts">
                <div class="card">
                    <div class="card-header"><h3>Execution Outcomes</h3></div>
                    <div id="dash-chart-outcomes"></div>
                </div>
                <div class="card">
                    <div class="card-header"><h3>Task Types</h3></div>
                    <div id="dash-chart-tasks"></div>
                </div>
                <div class="card">
                    <div class="card-header"><h3>Schedule Types</h3></div>
                    <div id="dash-chart-schedules"></div>
                </div>
            </div>
        </div>
        <div class="dash-tab-panel" data-tab="activity">
            <div class="card">
                <div class="card-header" style="cursor:pointer" onclick="showPage('events')"><h3>Recent Events <span style="font-size:11px;color:var(--accent)">&rarr;</span></h3></div>
                <div id="dash-recent-events"></div>
            </div>
        </div>
        <div class="dash-tab-panel" data-tab="infrastructure">
            <div class="dash-grid">
                <div class="card">
                    <div class="card-header" style="cursor:pointer" onclick="showPage('agents')"><h3>Agents <span style="font-size:11px;color:var(--accent)">&rarr;</span></h3></div>
                    <div id="dash-agents"></div>
                </div>
                <div class="card">
                    <div class="card-header" style="cursor:pointer" onclick="showPage('map')"><h3>Dependency Map <span style="font-size:11px;color:var(--accent)">&rarr;</span></h3></div>
                    <div class="mini-map-container" style="max-height:350px">
                        <svg id="dash-map-svg"></svg>
                    </div>
                </div>
            </div>
        </div>
    </section>
