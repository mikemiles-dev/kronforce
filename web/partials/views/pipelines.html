    <section id="pipelines-view" style="display:none">
        <div class="page-sub-tabs">
            <button class="sub-tab active" id="st-pipelines-stages" onclick="setSubTab('pipelines','stages')">Stages</button>
            <button class="sub-tab" id="st-pipelines-map" onclick="setSubTab('pipelines','map')">Map</button>
        </div>

        <div style="margin-bottom:12px">
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                <select id="stages-group-filter" onchange="fetchGroupsPage()" style="min-width:160px">
                    <option value="">Select a group...</option>
                </select>
                <button class="share-btn" onclick="shareCurrentPage()" title="Copy link to clipboard">&#128279; Share</button>
            </div>
        </div>

        <!-- Stages sub-tab -->
        <div id="pipelines-stages-panel">
            <div id="groups-grid"></div>
        </div>

        <!-- Map sub-tab -->
        <div id="pipelines-map-panel" style="display:none">
            <div class="map-container" id="map-container" style="width:100%;height:calc(100vh - 220px);border:1px solid var(--border);border-radius:var(--radius)"></div>
            <div class="map-controls" id="map-controls" style="display:none">
                <button onclick="cyInstance&&cyInstance.fit(undefined,30)" title="Fit all" class="map-fit-btn"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6V3a1 1 0 011-1h3M10 2h3a1 1 0 011 1v3M14 10v3a1 1 0 01-1 1h-3M6 14H3a1 1 0 01-1-1v-3"/><circle cx="8" cy="8" r="2.5"/></svg></button>
                <button onclick="clearMapPositions()" title="Reset layout" class="map-fit-btn"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2l12 12M14 2L2 14"/></svg></button>
                <button onclick="cyInstance&&cyInstance.zoom(cyInstance.zoom()/1.3);cyInstance.center()" title="Zoom out">&minus;</button>
                <input type="range" id="map-zoom-slider" min="15" max="300" value="100" oninput="if(cyInstance)cyInstance.zoom(this.value/100)" style="width:150px">
                <button onclick="cyInstance&&cyInstance.zoom(cyInstance.zoom()*1.3);cyInstance.center()" title="Zoom in">+</button>
            </div>
        </div>
    </section>
