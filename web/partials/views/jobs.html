    <section id="jobs-view" style="display:none">
        <div class="jobs-tab-bar">
            <div class="jobs-tab-left">
                <button class="jobs-tab active" id="jt-list" onclick="setJobsTab('list')"><span class="jobs-tab-icon">&#9889;</span> Jobs</button>
                <button class="jobs-tab" id="jt-groups" onclick="setJobsTab('groups')"><span class="jobs-tab-icon">&#128193;</span> Groups</button>
                <button class="jobs-tab" id="jt-stages" onclick="setJobsTab('stages')"><span class="jobs-tab-icon">&#9654;</span> Stages</button>
                <button class="jobs-tab" id="jt-map" onclick="setJobsTab('map')"><span class="jobs-tab-icon">&#9741;</span> Map</button>
            </div>
            <div class="jobs-tab-right">
                <label style="font-size:11px;font-weight:600;color:var(--accent)">Group:</label>
                <select id="group-filter" class="group-filter-select" onchange="setGroupFilter(this.value)" style="font-size:12px;padding:5px 10px">
                    <option value="">All</option>
                </select>
            </div>
        </div>
        <div id="jobs-list-panel">
            <div class="jobs-sub-toolbar" id="jobs-bulk-bar">
                <button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ Create</button>
                <button class="btn btn-ghost btn-sm" onclick="showTemplatesPicker()">Template</button>
                <button class="btn btn-primary btn-sm" id="bulk-run-btn" onclick="bulkTrigger()" disabled>&#9654; Run</button>
                <button class="btn btn-ghost btn-sm" id="bulk-group-btn" onclick="bulkSetGroup()" disabled>Set Group</button>
                <button class="btn btn-danger btn-sm" id="bulk-delete-btn" onclick="bulkDelete()" disabled>Delete</button>
                <button class="btn btn-ghost btn-sm" id="bulk-clear-btn" onclick="clearSelection()" disabled>Clear</button>
                <span id="bulk-count-text" class="bulk-count-text"></span>
            </div>
            <div id="jobs-table-wrap"></div>
            <div id="jobs-pagination" class="pagination"></div>
        </div>
        <div id="jobs-groups-panel" style="display:none;margin-top:16px">
            <div class="jobs-sub-toolbar">
                <button class="btn btn-primary btn-sm" onclick="createNewGroup()">+ Group</button>
                <button class="btn btn-ghost btn-sm" onclick="openCreateModal()">+ Create Job</button>
            </div>
            <div id="groups-grid" class="groups-grid"></div>
        </div>
        <div id="jobs-stages-panel" style="display:none;margin-top:16px">
            <div id="stages-content"></div>
        </div>
        <div id="jobs-map-panel" style="display:none;margin-top:16px">
            <div class="map-container" id="map-container" style="width:100%;height:calc(100vh - 220px);border:1px solid var(--border);border-radius:var(--radius)"></div>
            <div class="map-controls" id="map-controls" style="display:none">
                <button onclick="cyInstance&&cyInstance.fit(undefined,30)" title="Fit all" class="map-fit-btn"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6V3a1 1 0 011-1h3M10 2h3a1 1 0 011 1v3M14 10v3a1 1 0 01-1 1h-3M6 14H3a1 1 0 01-1-1v-3"/><circle cx="8" cy="8" r="2.5"/></svg></button>
                <button onclick="clearMapPositions()" title="Reset layout" class="map-fit-btn"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2l12 12M14 2L2 14"/></svg></button>
                <button onclick="cyInstance&&cyInstance.zoom(cyInstance.zoom()/1.3);cyInstance.center()" title="Zoom out">&minus;</button>
                <input type="range" id="map-zoom-slider" min="15" max="300" value="100" oninput="if(cyInstance)cyInstance.zoom(this.value/100)" style="width:150px">
                <button onclick="cyInstance&&cyInstance.zoom(cyInstance.zoom()*1.3);cyInstance.center()" title="Zoom in">+</button>
            </div>
        </div>
    </section>

    <section id="detail-view" style="display:none">
        <div class="back-link" onclick="showJobsList()">&larr; Back to Jobs</div>
        <div id="detail-card"></div>
        <div class="groups-tabs" style="margin-top:12px">
            <button class="groups-tab active" id="dt-overview" onclick="setDetailTab('overview')">Overview</button>
            <button class="groups-tab" id="dt-history" onclick="setDetailTab('history')">History</button>
            <button class="groups-tab" id="dt-map" onclick="setDetailTab('map')">Map</button>
        </div>
        <div id="detail-overview-panel">
            <div class="card" id="job-timeline-card">
                <div class="card-header"><h3>Timeline (1 hour)</h3></div>
                <div id="job-timeline"></div>
            </div>
        </div>
        <div id="detail-history-panel" style="display:none">
            <div class="card">
                <div class="card-header">
                    <h3>Execution History</h3>
                </div>
                <div id="exec-table-wrap"></div>
                <div id="exec-pagination" class="pagination"></div>
            </div>
        </div>
        <div id="detail-map-panel" style="display:none">
            <div class="card" id="mini-map-card">
                <div class="card-header">
                    <h3>Dependencies &amp; Connections</h3>
                </div>
                <div id="mini-map-svg" style="height:300px;width:100%"></div>
            </div>
        </div>
    </section>
