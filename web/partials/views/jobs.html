    <section id="jobs-view" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
                <div class="groups-tabs">
                    <button class="groups-tab active" id="jt-list" onclick="setJobsTab('list')">Jobs</button>
                    <button class="groups-tab" id="jt-groups" onclick="setJobsTab('groups')">Groups</button>
                    <button class="groups-tab" id="jt-stages" onclick="setJobsTab('stages')">Stages</button>
                </div>
                <select id="group-filter" class="group-filter-select" onchange="setGroupFilter(this.value)" style="font-size:13px;padding:6px 12px;border-color:var(--accent);color:var(--accent);font-weight:600">
                    <option value="">All Groups</option>
                </select>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
                <button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ Create Job</button>
                <button class="btn btn-ghost btn-sm" onclick="showTemplatesPicker()">From Template</button>
                <button class="btn btn-primary btn-sm" onclick="createNewGroup()">+ New Group</button>
            </div>
        </div>
        <div id="jobs-list-panel">
            <div class="jobs-toolbar" id="jobs-toolbar">
                <div class="jobs-toolbar-left">
                    <button class="btn btn-primary" id="bulk-run-btn" onclick="bulkTrigger()" disabled>&#9654; Schedule Now</button>
                    <button class="btn btn-ghost" id="bulk-group-btn" onclick="bulkSetGroup()" disabled>Set Group</button>
                    <button class="btn btn-danger" id="bulk-delete-btn" onclick="bulkDelete()" disabled>Delete</button>
                    <button class="btn btn-ghost" id="bulk-clear-btn" onclick="clearSelection()" disabled>Clear</button>
                </div>
                <span id="bulk-count-text" class="bulk-count-text"></span>
            </div>
            <div id="jobs-table-wrap"></div>
            <div id="jobs-pagination" class="pagination"></div>
        </div>
        <div id="jobs-groups-panel" style="display:none">
            <div id="groups-grid" class="groups-grid"></div>
        </div>
        <div id="jobs-stages-panel" style="display:none">
            <div id="stages-content"></div>
        </div>
    </section>

    <section id="detail-view" style="display:none">
        <div class="back-link" onclick="showJobsList()">&larr; Back to Jobs</div>
        <div id="detail-card"></div>
        <div class="card" id="job-timeline-card">
            <div class="card-header"><h3>Timeline (1 hour)</h3></div>
            <div id="job-timeline"></div>
        </div>
        <div class="card">
            <div class="card-header">
                <h3>Execution History</h3>
            </div>
            <div id="exec-table-wrap"></div>
            <div id="exec-pagination" class="pagination"></div>
        </div>
        <div class="card" id="mini-map-card" style="display:none">
            <div class="card-header">
                <h3>Dependencies</h3>
            </div>
            <div class="mini-map-container">
                <svg id="mini-map-svg"></svg>
            </div>
        </div>
    </section>
