    <section id="jobs-view" style="display:none">
        <div class="jobs-tab-bar">
            <div class="jobs-tab-left">
                <button class="jobs-tab active" id="jt-list" onclick="setJobsTab('list')">Jobs</button>
                <button class="jobs-tab" id="jt-groups" onclick="setJobsTab('groups')">Groups</button>
                <button class="jobs-tab" id="jt-stages" onclick="setJobsTab('stages')">Stages</button>
                <select id="group-filter" class="group-filter-select" onchange="setGroupFilter(this.value)" style="font-size:12px;padding:4px 10px;margin-left:8px">
                    <option value="">All Groups</option>
                </select>
            </div>
            <div class="jobs-tab-right">
                <button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ Create</button>
                <button class="btn btn-ghost btn-sm" id="jobs-template-btn" onclick="showTemplatesPicker()">Template</button>
                <button class="btn btn-ghost btn-sm" id="jobs-newgroup-btn" onclick="createNewGroup()" style="display:none">+ Group</button>
            </div>
        </div>
        <div id="jobs-list-panel">
            <div class="jobs-sub-toolbar" id="jobs-bulk-bar">
                <button class="btn btn-primary btn-sm" id="bulk-run-btn" onclick="bulkTrigger()" disabled>&#9654; Run</button>
                <button class="btn btn-ghost btn-sm" id="bulk-group-btn" onclick="bulkSetGroup()" disabled>Set Group</button>
                <button class="btn btn-danger btn-sm" id="bulk-delete-btn" onclick="bulkDelete()" disabled>Delete</button>
                <button class="btn btn-ghost btn-sm" id="bulk-clear-btn" onclick="clearSelection()" disabled>Clear</button>
                <span id="bulk-count-text" class="bulk-count-text"></span>
            </div>
            <div id="jobs-table-wrap"></div>
            <div id="jobs-pagination" class="pagination"></div>
        </div>
        <div id="jobs-groups-panel" style="display:none">
            <div id="groups-grid" class="groups-grid"></div>
        </div>
        <div id="jobs-stages-panel" style="display:none">
            <div class="jobs-sub-toolbar">
                <select id="stages-group-select" class="group-filter-select" onchange="renderJobsStagesTab()" style="font-size:13px;padding:5px 10px;min-width:160px">
                    <option value="">All Groups</option>
                </select>
            </div>
            <div id="stages-content"></div>
        </div>
    </section>

    <section id="detail-view" style="display:none">
        <div class="back-link" onclick="showJobsList()">&larr; Back to Jobs</div>
        <div id="detail-card"></div>
        <div class="card" id="job-timeline-card">
            <div class="card-header"><h3>Timeline (1 hour)</h3></div>
            <div id="job-timeline"></div>
        </div>
        <div class="card">
            <div class="card-header">
                <h3>Execution History</h3>
            </div>
            <div id="exec-table-wrap"></div>
            <div id="exec-pagination" class="pagination"></div>
        </div>
        <div class="card" id="mini-map-card" style="display:none">
            <div class="card-header">
                <h3>Dependencies</h3>
            </div>
            <div class="mini-map-container">
                <svg id="mini-map-svg"></svg>
            </div>
        </div>
    </section>
