    <section id="groups-view" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
                <div class="groups-tabs">
                    <button class="groups-tab active" id="gv-cards" onclick="setGroupsView('cards')">Groups</button>
                    <button class="groups-tab" id="gv-pipeline" onclick="setGroupsView('pipeline')">Stages</button>
                    <button class="groups-tab" id="gv-map" onclick="setGroupsView('map')">Map</button>
                </div>
                <select id="stages-group-filter" class="group-filter-select" onchange="fetchGroupsPage()" style="display:none;font-size:14px;padding:6px 12px;min-width:180px">
                    <option value="">Select a group...</option>
                </select>
                <select id="map-group-filter" class="group-filter-select" onchange="renderMap()" style="display:none;font-size:14px;padding:6px 12px;min-width:180px">
                    <option value="">All Groups</option>
                </select>
                <button class="btn btn-primary btn-sm" onclick="createNewGroup()">+ New Group</button>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
                <button class="share-btn" onclick="shareCurrentPage()" title="Copy link to clipboard">&#128279; Share</button>
            </div>
        </div>
        <div id="groups-grid" class="groups-grid"></div>
        <div id="groups-map-wrap" style="display:none">
            <div class="map-container" id="map-container" style="width:100%;height:calc(100vh - 180px);border:1px solid var(--border);border-radius:var(--radius)"></div>
            <div class="map-controls" id="map-controls" style="display:none">
                <button onclick="cyInstance&&cyInstance.fit(undefined,30)" title="Fit all" class="map-fit-btn"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6V3a1 1 0 011-1h3M10 2h3a1 1 0 011 1v3M14 10v3a1 1 0 01-1 1h-3M6 14H3a1 1 0 01-1-1v-3"/><circle cx="8" cy="8" r="2.5"/></svg></button>
                <button onclick="clearMapPositions()" title="Reset layout" class="map-fit-btn"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2l12 12M14 2L2 14"/></svg></button>
                <button onclick="cyInstance&&cyInstance.zoom(cyInstance.zoom()/1.3);cyInstance.center()" title="Zoom out">&minus;</button>
                <input type="range" id="map-zoom-slider" min="15" max="300" value="100" oninput="if(cyInstance)cyInstance.zoom(this.value/100)" style="width:150px">
                <button onclick="cyInstance&&cyInstance.zoom(cyInstance.zoom()*1.3);cyInstance.center()" title="Zoom in">+</button>
            </div>
        </div>
    </section>
