<div class="action-bar" id="jobs-action-bar">
    <div class="action-bar-inner">
        <div class="action-bar-left">
            <div class="search-wrap">
                <span class="search-icon">&#128269;</span>
                <input id="search-input" type="text" placeholder="Search jobs..." oninput="jobSearch.onSearch()">
                <button id="search-clear" class="search-clear" onclick="jobSearch.clearSearch()" style="display:none">&times;</button>
            </div>
            <div class="status-filters" id="status-filters">
                <button class="status-btn active" data-status="" onclick="jobSearch.setStatusFilter(this, '')">All</button>
                <button class="status-btn s-active" data-status="scheduled" onclick="jobSearch.setStatusFilter(this, 'scheduled')">Scheduled</button>
                <button class="status-btn s-completed" data-status="running" onclick="jobSearch.setStatusFilter(this, 'running')">Running</button>
                <button class="status-btn s-danger" data-status="failed" onclick="jobSearch.setStatusFilter(this, 'failed')">Failed</button>
                <button class="status-btn s-paused" data-status="paused" onclick="jobSearch.setStatusFilter(this, 'paused')">Paused</button>
                <button class="status-btn s-completed" data-status="unscheduled" onclick="jobSearch.setStatusFilter(this, 'unscheduled')">Unscheduled</button>
                <button class="status-btn s-paused" data-status="blocked" onclick="jobSearch.setStatusFilter(this, 'blocked')">Waiting</button>
            </div>
        </div>
        <div class="action-bar-right">
            <div class="refresh-control">
                <button id="refresh-toggle" class="refresh-toggle active" onclick="toggleAutoRefresh()" title="Toggle auto-refresh">
                    <span class="refresh-icon">&#x21BB;</span>
                    <span id="refresh-label">On</span>
                </button>
                <span id="refresh-countdown" class="refresh-countdown"></span>
                <select id="refresh-interval" class="refresh-interval-select" onchange="changeRefreshInterval()" title="Refresh interval">
                    <option value="2">2s</option>
                    <option value="5" selected>5s</option>
                    <option value="10">10s</option>
                    <option value="30">30s</option>
                    <option value="60">60s</option>
                </select>
                <button class="refresh-now" onclick="refreshNow()" title="Refresh now">Refresh</button>
            </div>
            <button class="share-btn" onclick="shareCurrentPage()" title="Copy link to clipboard">&#128279; Share</button>
            <div class="time-range-wrap">
                <button class="time-range-trigger" onclick="toggleTimeRangePopup('jobs',event)">
                    <span class="tr-icon">&#128339;</span>
                    <span class="tr-label" id="tr-label-jobs">All time</span>
                    <span style="font-size:9px">&#9660;</span>
                </button>
                <div class="time-range-popup" id="tr-popup-jobs" style="display:none"></div>
            </div>
        </div>
    </div>
</div>
