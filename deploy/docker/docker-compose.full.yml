# Kronforce Controller + Agent (local development / testing)
#
# Start:
#   docker compose -f docker-compose.full.yml up -d
#
# On first startup, keys are auto-generated and saved to the data volume.
# Retrieve keys:
#   docker compose -f docker-compose.full.yml exec controller cat /data/bootstrap-keys.txt
#
# Or pre-set keys via environment:
#   KRONFORCE_ADMIN_KEY=kf_mykey KRONFORCE_AGENT_KEY=kf_agentkey docker compose -f docker-compose.full.yml up -d

services:
  controller:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    command: kronforce
    ports:
      - "8080:8080"
    volumes:
      - kronforce-data:/data
      - kronforce-scripts:/scripts
    environment:
      - KRONFORCE_DB=/data/kronforce.db
      - KRONFORCE_BIND=0.0.0.0:8080
      - KRONFORCE_SCRIPTS_DIR=/scripts
      - KRONFORCE_CALLBACK_URL=http://controller:8080
      - KRONFORCE_BOOTSTRAP_ADMIN_KEY=${KRONFORCE_ADMIN_KEY:-}
      - KRONFORCE_BOOTSTRAP_AGENT_KEY=${KRONFORCE_AGENT_KEY:-}
      - RUST_LOG=kronforce=info
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  agent:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    command: kronforce-agent
    depends_on:
      controller:
        condition: service_healthy
    volumes:
      - kronforce-data:/data:ro
    environment:
      - KRONFORCE_CONTROLLER_URL=http://controller:8080
      - KRONFORCE_AGENT_KEY=${KRONFORCE_AGENT_KEY:-}
      - KRONFORCE_AGENT_NAME=docker-agent-1
      - KRONFORCE_AGENT_TAGS=docker,linux
      - KRONFORCE_AGENT_ADDRESS=agent
      - KRONFORCE_AGENT_BIND=0.0.0.0:8081
      - RUST_LOG=kronforce_agent=info

volumes:
  kronforce-data:
  kronforce-scripts:
