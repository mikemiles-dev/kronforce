# Kronforce Controller
# Start: docker compose up -d
# Dashboard: http://localhost:8080
# First startup prints admin + agent API keys to logs:
#   docker compose logs controller | grep "key"

services:
  controller:
    image: ghcr.io/mikemiles-dev/kronforce:latest
    # To build locally instead: docker compose build
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    command: kronforce
    ports:
      - "8080:8080"
    volumes:
      - kronforce-data:/data
      - kronforce-scripts:/scripts
    environment:
      - KRONFORCE_DB=/data/kronforce.db
      - KRONFORCE_BIND=0.0.0.0:8080
      - KRONFORCE_SCRIPTS_DIR=/scripts
      - KRONFORCE_CALLBACK_URL=http://localhost:8080
      - RUST_LOG=kronforce=info
      # Optional: pre-set bootstrap keys (only used on first startup with empty DB)
      # - KRONFORCE_BOOTSTRAP_ADMIN_KEY=kf_your_admin_key
      # - KRONFORCE_BOOTSTRAP_AGENT_KEY=kf_your_agent_key
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  kronforce-data:
  kronforce-scripts:
