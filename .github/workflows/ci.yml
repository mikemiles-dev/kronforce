name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test --all

  migration-check:
    name: Migration Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Build current
        run: cargo build --release
      - name: Test fresh database migrations
        run: |
          # Start controller, let it create and migrate a fresh DB, then shut down
          timeout 5 ./target/release/kronforce || true
          # Verify DB was created and has the schema_version table
          sqlite3 kronforce.db "SELECT MAX(version) FROM schema_version;" | grep -E "^[0-9]+"
          echo "Fresh migration: OK"
      - name: Test migration from previous release
        run: |
          # Get the previous release tag
          PREV_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous release tags found, skipping upgrade test"
            exit 0
          fi
          echo "Testing migration from $PREV_TAG to current"

          # Build previous version
          git stash || true
          git checkout "$PREV_TAG"
          cargo build --release 2>/dev/null || { echo "Previous version build failed, skipping"; exit 0; }

          # Create DB with previous version
          rm -f kronforce.db
          timeout 5 ./target/release/kronforce || true
          OLD_VERSION=$(sqlite3 kronforce.db "SELECT MAX(version) FROM schema_version;")
          echo "Previous DB version: $OLD_VERSION"

          # Switch back to current and rebuild
          git checkout -
          git stash pop || true
          cargo build --release

          # Run current version against old DB — should migrate
          timeout 5 ./target/release/kronforce || true
          NEW_VERSION=$(sqlite3 kronforce.db "SELECT MAX(version) FROM schema_version;")
          echo "Migrated DB version: $NEW_VERSION"

          if [ "$NEW_VERSION" -ge "$OLD_VERSION" ]; then
            echo "Migration upgrade: OK ($OLD_VERSION -> $NEW_VERSION)"
          else
            echo "Migration FAILED: version went from $OLD_VERSION to $NEW_VERSION"
            exit 1
          fi

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Audit dependencies
        run: cargo audit
      - name: Check for yanked crates
        run: cargo audit --deny yanked

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release
        run: cargo build --release
      - name: Verify binaries exist
        run: |
          test -f target/release/kronforce
          test -f target/release/kronforce-agent
          echo "Binaries built successfully"
