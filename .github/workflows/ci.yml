name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # Lint + Test + Build in one job — saves 2 runner startups + shared compilation
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features
      - name: Test
        run: cargo test --all
      - name: Build release
        run: cargo build --release
      - name: Verify binaries
        run: test -f target/release/kronforce && test -f target/release/kronforce-agent

  js-test:
    name: JS Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Run JS tests
        run: |
          for f in web/tests/test_*.js; do
            echo "--- $f ---"
            node "$f"
          done

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - uses: EmbarkStudios/cargo-deny-action@v2
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  migration-check:
    name: Migration
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test fresh migrations
        run: |
          cargo build --release
          timeout 5 ./target/release/kronforce || true
          sqlite3 kronforce.db "SELECT MAX(version) FROM schema_version;" | grep -E "^[0-9]+"
