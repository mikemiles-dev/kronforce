name: Docker Latest

on:
  push:
    branches: [main]

permissions:
  packages: write

jobs:
  docker:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Platform suffix
        id: platform
        run: echo "suffix=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Build and push platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          provenance: false
          cache-from: type=gha,scope=latest-${{ steps.platform.outputs.suffix }}
          cache-to: type=gha,mode=max,scope=latest-${{ steps.platform.outputs.suffix }}
          tags: |
            ghcr.io/mikemiles-dev/kronforce:edge-${{ steps.platform.outputs.suffix }}

  manifest:
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push latest manifest
        run: |
          IMAGE=ghcr.io/mikemiles-dev/kronforce

          docker manifest create ${IMAGE}:latest \
            ${IMAGE}:edge-linux-amd64 \
            ${IMAGE}:edge-linux-arm64
          docker manifest push ${IMAGE}:latest
